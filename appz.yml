app:
    name: Vault
    code: VAULT
    notify: app@ecloudcontrol.com

build:
    version: 0.4
    env: PROD
    build_file: none
    output_files: output/*.zip
    image_template: vault-1.2

deploy:
    context: vv/PROD
    type: statefulset
    ingress: none
    replicas: 1
    port:
    - 8200
    - 80
    nodeSelector:
      nodepool: clickhouse
    tolerations:
      - key: nodepool
        operator: Equal
        value: clickhouse
        effect: NoSchedule

volumes:
  - claim: vault-home
    class: linode-block-storage
    mount: /appz/home
    name: home
    size: 5Gi
    matchLabels: false
  - claim: vault-data
    class: linode-block-storage
    mount: /appz/data
    name: data
    size: 5Gi
    matchLabels: false
properties:
    ENABLE_AUTO_PASSWORD: False
    revision: 14
